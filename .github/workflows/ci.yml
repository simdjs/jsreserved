name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build clang

    - name: Configure
      run: |
        cd benchmark
        mkdir build
        cd build
        cmake .. -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd benchmark/build
        make -j$(nproc)

    - name: Test
      run: |
        cd benchmark/build
        ./benchmark --filter gperf,jsreserved,hits | head -20